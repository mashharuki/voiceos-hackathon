<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Poker</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --bg2: #0d0d1a;
      --panel: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --green: #00ff88;
      --green-dim: rgba(0,255,136,0.15);
      --gold: #ffd700;
      --gold-dim: rgba(255,215,0,0.15);
      --red: #ff4466;
      --text: #e8e8f0;
      --text-dim: rgba(232,232,240,0.5);
      --radius: 16px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    /* ===== Layout ===== */
    .app {
      display: grid;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }

    /* ===== Header ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,7,15,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--green), #00aaff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .session-badge {
      font-size: 12px;
      color: var(--text-dim);
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 20px;
      font-family: "SF Mono", "Menlo", monospace;
    }

    /* ===== Main split ===== */
    .main {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100%;
      overflow: hidden;
    }

    /* ===== Left panel — Voice OS ===== */
    .voice-panel {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
    }

    .panel-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* Waveform */
    .waveform-container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #waveform {
      width: 100%;
      height: 80px;
      border-radius: 12px;
      background: var(--panel);
    }

    /* Voice button */
    .voice-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--green);
      background: var(--green-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: all 0.2s ease;
      position: relative;
      flex-shrink: 0;
    }

    .voice-btn:hover {
      background: rgba(0,255,136,0.25);
      transform: scale(1.05);
    }

    .voice-btn.listening {
      background: rgba(0,255,136,0.3);
      box-shadow: 0 0 0 12px rgba(0,255,136,0.1), 0 0 0 24px rgba(0,255,136,0.05);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 12px rgba(0,255,136,0.1), 0 0 0 24px rgba(0,255,136,0.05); }
      50% { box-shadow: 0 0 0 16px rgba(0,255,136,0.15), 0 0 0 32px rgba(0,255,136,0.07); }
    }

    .voice-label {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* Transcript */
    .transcript-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .transcript-area::-webkit-scrollbar { width: 4px; }
    .transcript-area::-webkit-scrollbar-track { background: transparent; }
    .transcript-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 92%;
      animation: fadeSlide 0.3s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      background: var(--green-dim);
      border: 1px solid rgba(0,255,136,0.2);
      align-self: flex-end;
      color: #b0ffd8;
    }

    .msg.ai {
      background: var(--panel);
      border: 1px solid var(--border);
      align-self: flex-start;
    }

    /* Quick actions */
    .quick-actions {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-btn {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .quick-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-dim);
    }

    /* ===== Right panel — Poker ===== */
    .poker-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,80,30,0.2) 0%, var(--bg) 60%);
    }

    /* Table felt */
    .poker-table {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px;
      position: relative;
    }

    /* Opponent info */
    .player-info {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      width: 100%;
      max-width: 520px;
    }

    .player-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .player-avatar.opponent { background: rgba(255,68,102,0.2); border: 1px solid rgba(255,68,102,0.3); }
    .player-avatar.you { background: var(--green-dim); border: 1px solid rgba(0,255,136,0.3); }

    .player-name { font-size: 13px; font-weight: 600; }
    .player-stack { font-size: 12px; color: var(--gold); margin-left: auto; }

    /* Opponent hidden cards */
    .opp-cards {
      display: flex;
      gap: 6px;
    }

    .card-back {
      width: 40px;
      height: 56px;
      border-radius: 8px;
      background: linear-gradient(135deg, #1a1a3e, #2a2a5e);
      border: 1px solid rgba(100,100,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    /* Community cards area */
    .community-area {
      background: rgba(0,100,50,0.15);
      border: 1px solid rgba(0,200,80,0.15);
      border-radius: 20px;
      padding: 20px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 520px;
    }

    .community-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .cards-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* Cards */
    .card {
      width: 56px;
      height: 80px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: #111;
      position: relative;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      transition: transform 0.2s ease;
      perspective: 600px;
      animation: cardFlip 0.4s ease;
    }

    @keyframes cardFlip {
      from { transform: rotateY(90deg) scale(0.8); opacity: 0; }
      to { transform: rotateY(0deg) scale(1); opacity: 1; }
    }

    .card:hover { transform: translateY(-4px); }

    .card.red { color: #cc0022; }

    .card-rank {
      font-size: 22px;
      line-height: 1;
    }

    .card-suit {
      font-size: 16px;
      line-height: 1;
    }

    .card-placeholder {
      width: 56px;
      height: 80px;
      border-radius: 10px;
      border: 2px dashed rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.1);
      font-size: 24px;
    }

    /* Pot */
    .pot-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .pot-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .pot-amount {
      font-size: 28px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -1px;
    }

    /* Phase badge */
    .phase-badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--green-dim);
      border: 1px solid rgba(0,255,136,0.3);
      color: var(--green);
    }

    .phase-badge.showdown {
      background: var(--gold-dim);
      border-color: rgba(255,215,0,0.4);
      color: var(--gold);
    }

    /* ===== Bottom bar ===== */
    .bottom-bar {
      border-top: 1px solid var(--border);
      background: rgba(7,7,15,0.95);
      backdrop-filter: blur(20px);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .bet-display {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .bet-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .bet-value { font-size: 20px; font-weight: 700; color: var(--text); }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-left: auto;
    }

    .action-btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    .btn-fold {
      background: rgba(255,68,102,0.15);
      border: 1px solid rgba(255,68,102,0.4);
      color: var(--red);
    }

    .btn-fold:hover { background: rgba(255,68,102,0.3); transform: translateY(-1px); }

    .btn-call {
      background: rgba(0,120,255,0.15);
      border: 1px solid rgba(0,120,255,0.4);
      color: #66aaff;
    }

    .btn-call:hover { background: rgba(0,120,255,0.3); transform: translateY(-1px); }

    .btn-raise {
      background: var(--green-dim);
      border: 1px solid rgba(0,255,136,0.4);
      color: var(--green);
    }

    .btn-raise:hover { background: rgba(0,255,136,0.3); transform: translateY(-1px); }

    .btn-new {
      background: var(--gold-dim);
      border: 1px solid rgba(255,215,0,0.4);
      color: var(--gold);
    }

    .btn-new:hover { background: rgba(255,215,0,0.3); transform: translateY(-1px); }

    .action-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Last action toast */
    .last-action {
      flex: 1;
      font-size: 13px;
      color: var(--text-dim);
      padding: 10px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Winner overlay */
    .winner-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(7,7,15,0.85);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      z-index: 20;
      flex-direction: column;
      gap: 20px;
      animation: fadeIn 0.4s ease;
    }

    .winner-overlay.visible { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .winner-text {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -2px;
    }

    .winner-text.win { color: var(--gold); text-shadow: 0 0 40px rgba(255,215,0,0.5); }
    .winner-text.lose { color: var(--red); text-shadow: 0 0 40px rgba(255,68,102,0.5); }

    .winner-sub { font-size: 16px; color: var(--text-dim); }

    /* Loading */
    .loading { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🎴</div>
      Voice Poker
    </div>
    <div class="session-badge" id="sessionBadge">No active game</div>
  </header>

  <!-- Main split -->
  <div class="main">
    <!-- Left: Voice OS -->
    <div class="voice-panel">
      <div class="panel-header">
        <div class="panel-title">Voice OS</div>
      </div>

      <div class="waveform-container">
        <canvas id="waveform"></canvas>
        <button class="voice-btn" id="voiceBtn" title="Hold to speak">🎤</button>
        <span class="voice-label" id="voiceLabel">Tap to speak</span>
      </div>

      <div class="transcript-area" id="transcript">
        <div class="msg ai">👋 Welcome to Voice Poker! Say "new game" or tap a quick action below to start.</div>
      </div>

      <div class="quick-actions">
        <button class="quick-btn" onclick="quickAction('new game')">🎲 New Game</button>
        <button class="quick-btn" onclick="quickAction('fold')">❌ Fold</button>
        <button class="quick-btn" onclick="quickAction('call')">✅ Call</button>
        <button class="quick-btn" onclick="quickAction('raise 100')">📈 Raise $100</button>
        <button class="quick-btn" onclick="quickAction('deal')">🃏 Deal</button>
      </div>
    </div>

    <!-- Right: Poker -->
    <div class="poker-panel">
      <div class="poker-table" id="pokerTable">
        <!-- Winner overlay -->
        <div class="winner-overlay" id="winnerOverlay">
          <div class="winner-text" id="winnerText">🏆 YOU WIN!</div>
          <div class="winner-sub" id="winnerSub">Pot collected</div>
          <button class="action-btn btn-new" onclick="startNewGame()">Play Again</button>
        </div>

        <!-- Opponent -->
        <div class="player-info">
          <div class="player-avatar opponent">🤖</div>
          <div>
            <div class="player-name">Opponent</div>
          </div>
          <div class="opp-cards" id="oppCards">
            <div class="card-back">🂠</div>
            <div class="card-back">🂠</div>
          </div>
          <div class="player-stack" id="oppStack">$1000</div>
        </div>

        <!-- Community cards -->
        <div class="community-area">
          <div class="community-label">Community Cards</div>
          <div class="cards-row" id="communityCards">
            <div class="card-placeholder">?</div>
            <div class="card-placeholder">?</div>
            <div class="card-placeholder">?</div>
            <div class="card-placeholder">?</div>
            <div class="card-placeholder">?</div>
          </div>
          <div style="display:flex;gap:12px;align-items:center;margin-top:4px;">
            <span class="phase-badge" id="phaseBadge">WAITING</span>
            <div class="pot-display">
              <span class="pot-label">Pot</span>
              <span class="pot-amount" id="potAmount">$0</span>
            </div>
          </div>
        </div>

        <!-- Player hand -->
        <div class="player-info">
          <div class="player-avatar you">😎</div>
          <div>
            <div class="player-name">You</div>
          </div>
          <div class="cards-row" id="playerCards">
            <div class="card-placeholder">?</div>
            <div class="card-placeholder">?</div>
          </div>
          <div class="player-stack" id="playerStack">$1000</div>
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="bottom-bar">
        <div class="bet-display">
          <span class="bet-label">Current Bet</span>
          <span class="bet-value" id="currentBet">$0</span>
        </div>
        <div class="last-action" id="lastAction">Start a new game to play</div>
        <div class="action-buttons">
          <button class="action-btn btn-fold" onclick="doAction('fold')" id="btnFold" disabled>Fold</button>
          <button class="action-btn btn-call" onclick="doAction('call')" id="btnCall" disabled>Call</button>
          <button class="action-btn btn-raise" onclick="doAction('raise')" id="btnRaise" disabled>Raise ↑</button>
          <button class="action-btn btn-new" onclick="startNewGame()" id="btnNew">New Game</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ===== State =====
  let sessionId = null;
  let gameState = null;
  let pollInterval = null;
  let audioCtx = null;
  let analyser = null;
  let animFrame = null;
  let recognition = null;
  let isListening = false;

  // ===== Waveform =====
  const canvas = document.getElementById('waveform');
  const ctx2d = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth * devicePixelRatio;
    canvas.height = canvas.offsetHeight * devicePixelRatio;
    ctx2d.scale(devicePixelRatio, devicePixelRatio);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawIdle() {
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    ctx2d.clearRect(0, 0, W, H);
    const t = Date.now() / 1000;
    ctx2d.beginPath();
    ctx2d.strokeStyle = 'rgba(0,255,136,0.3)';
    ctx2d.lineWidth = 2;
    for (let x = 0; x < W; x++) {
      const y = H/2 + Math.sin(x * 0.05 + t * 2) * 8 + Math.sin(x * 0.02 + t) * 4;
      x === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
    }
    ctx2d.stroke();
    animFrame = requestAnimationFrame(drawIdle);
  }
  drawIdle();

  function drawLive(data) {
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    ctx2d.clearRect(0, 0, W, H);
    ctx2d.beginPath();
    ctx2d.strokeStyle = '#00ff88';
    ctx2d.lineWidth = 2.5;
    ctx2d.shadowColor = '#00ff88';
    ctx2d.shadowBlur = 8;
    const step = W / data.length;
    for (let i = 0; i < data.length; i++) {
      const y = H/2 + (data[i] - 128) / 128 * (H/2 - 4);
      i === 0 ? ctx2d.moveTo(0, y) : ctx2d.lineTo(i * step, y);
    }
    ctx2d.stroke();
    ctx2d.shadowBlur = 0;
  }

  // ===== Voice recognition =====
  const voiceBtn = document.getElementById('voiceBtn');
  const voiceLabel = document.getElementById('voiceLabel');

  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.lang = 'en-US';

    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript.toLowerCase();
      addMessage(text, 'user');
      parseVoiceCommand(text);
    };

    recognition.onend = () => {
      isListening = false;
      voiceBtn.classList.remove('listening');
      voiceBtn.textContent = '🎤';
      voiceLabel.textContent = 'Tap to speak';
    };
  }

  voiceBtn.addEventListener('click', () => {
    if (!recognition) {
      addMessage('Speech recognition not supported. Use quick actions below.', 'ai');
      return;
    }
    if (isListening) {
      recognition.stop();
    } else {
      isListening = true;
      voiceBtn.classList.add('listening');
      voiceBtn.textContent = '⏹';
      voiceLabel.textContent = 'Listening...';
      recognition.start();
    }
  });

  // ===== Voice commands =====
  function parseVoiceCommand(text) {
    if (text.includes('new') || text.includes('start') || text.includes('deal me in')) {
      startNewGame();
    } else if (text.includes('fold')) {
      doAction('fold');
    } else if (text.includes('call') || text.includes('check')) {
      doAction('call');
    } else if (text.includes('raise') || text.includes('bet')) {
      const match = text.match(/(\d+)/);
      doAction('raise', match ? parseInt(match[1]) : null);
    } else if (text.includes('deal') || text.includes('flop') || text.includes('turn') || text.includes('river')) {
      doDeal();
    } else {
      addMessage("I didn't catch that. Try: 'new game', 'fold', 'call', 'raise 100', or 'deal'.", 'ai');
    }
  }

  function quickAction(cmd) {
    addMessage(cmd, 'user');
    parseVoiceCommand(cmd.toLowerCase());
  }

  // ===== API calls =====
  async function startNewGame() {
    const id = `game-${Date.now()}`;
    addMessage('Starting a new game...', 'ai');
    try {
      const res = await fetch('/api/new-game', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: id }),
      });
      const state = await res.json();
      sessionId = id;
      updateUI(state);
      startPolling();
      addMessage(`🃏 Game started! Session: ${id.slice(-8)}. Your hand is dealt. Good luck!`, 'ai');
    } catch (e) {
      addMessage('Failed to start game. Is the backend running?', 'ai');
    }
  }

  async function doAction(action, amount) {
    if (!sessionId) { addMessage('Start a new game first!', 'ai'); return; }
    if (gameState?.phase === 'showdown') { addMessage('Game is over. Start a new game.', 'ai'); return; }
    try {
      const body = { sessionId, action };
      if (action === 'raise' && amount) body.amount = amount;
      const res = await fetch('/api/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const state = await res.json();
      updateUI(state);
      addMessage(state.lastAction, 'ai');
    } catch (e) {
      addMessage('Action failed.', 'ai');
    }
  }

  async function doDeal() {
    if (!sessionId) { addMessage('Start a new game first!', 'ai'); return; }
    try {
      const res = await fetch('/api/deal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      });
      const state = await res.json();
      updateUI(state);
      addMessage(state.lastAction, 'ai');
    } catch (e) {
      addMessage('Deal failed.', 'ai');
    }
  }

  // ===== Polling =====
  function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(async () => {
      if (!sessionId) return;
      try {
        const res = await fetch(`/api/state/${sessionId}`);
        if (res.ok) {
          const state = await res.json();
          if (state.updatedAt !== gameState?.updatedAt) updateUI(state);
        }
      } catch (_) {}
    }, 2000);
  }

  // ===== UI Update =====
  function updateUI(state) {
    gameState = state;
    document.getElementById('sessionBadge').textContent = state.sessionId.slice(-12);
    document.getElementById('potAmount').textContent = `$${state.pot}`;
    document.getElementById('playerStack').textContent = `$${state.playerStack}`;
    document.getElementById('oppStack').textContent = `$${state.opponentStack}`;
    document.getElementById('currentBet').textContent = `$${state.currentBet}`;
    document.getElementById('lastAction').textContent = state.lastAction;

    // Phase badge
    const badge = document.getElementById('phaseBadge');
    badge.textContent = state.phase.toUpperCase();
    badge.className = 'phase-badge' + (state.phase === 'showdown' ? ' showdown' : '');

    // Player hand
    renderCards('playerCards', state.playerHand, 2);

    // Community cards
    renderCommunityCards(state.communityCards);

    // Action buttons
    const isOver = state.phase === 'showdown';
    document.getElementById('btnFold').disabled = isOver || !state.playerHand.length;
    document.getElementById('btnCall').disabled = isOver || !state.playerHand.length;
    document.getElementById('btnRaise').disabled = isOver || !state.playerHand.length;

    // Winner overlay
    if (state.winner) {
      const overlay = document.getElementById('winnerOverlay');
      const text = document.getElementById('winnerText');
      const sub = document.getElementById('winnerSub');
      overlay.classList.add('visible');
      if (state.winner === 'player') {
        text.textContent = '🏆 YOU WIN!';
        text.className = 'winner-text win';
        sub.textContent = `You collected $${state.pot}!`;
      } else {
        text.textContent = '😢 YOU LOSE';
        text.className = 'winner-text lose';
        sub.textContent = 'Better luck next time.';
      }
    } else {
      document.getElementById('winnerOverlay').classList.remove('visible');
    }
  }

  function renderCards(containerId, cards, slots) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    for (let i = 0; i < slots; i++) {
      if (cards[i]) {
        el.appendChild(makeCard(cards[i]));
      } else {
        const ph = document.createElement('div');
        ph.className = 'card-placeholder';
        ph.textContent = '?';
        el.appendChild(ph);
      }
    }
  }

  function renderCommunityCards(cards) {
    const el = document.getElementById('communityCards');
    el.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      if (cards[i]) {
        el.appendChild(makeCard(cards[i]));
      } else {
        const ph = document.createElement('div');
        ph.className = 'card-placeholder';
        ph.textContent = '?';
        el.appendChild(ph);
      }
    }
  }

  function makeCard(card) {
    const isRed = card.suit === '♥' || card.suit === '♦';
    const div = document.createElement('div');
    div.className = 'card' + (isRed ? ' red' : '');
    div.innerHTML = `<span class="card-rank">${card.rank}</span><span class="card-suit">${card.suit}</span>`;
    return div;
  }

  // ===== Transcript =====
  function addMessage(text, role) {
    const area = document.getElementById('transcript');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }
</script>
</body>
</html>
